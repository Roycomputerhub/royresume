<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Roy Computer Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-content { max-width: 600px; margin: 40px auto; padding: 40px; background: #fff; border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,.07); }
    .page-content h1 { font-family: 'Outfit', sans-serif; color: #b91c1c; margin-bottom: 20px; text-align: center; }
    .page-content p { color: #4b5563; margin-bottom: 25px; line-height: 1.6; text-align: center; }
    .contact-form { display: flex; flex-direction: column; gap: 15px; }
    .contact-form input, .contact-form textarea { padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-family: 'Inter', sans-serif; }
    .contact-form input:focus, .contact-form textarea:focus { border-color: #f87171; outline: none; }
    .contact-form button { background: #b91c1c; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .contact-form button:hover { background: #991b1b; }
  </style>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7323121560865663" crossorigin="anonymous"></script>
</head>
<body>
  <header class="header-bar">
    <div class="header-bar__inner">
      <div class="header-bar__brand">
        <a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 10px;">
          <span class="header-bar__icon">📄</span>
          <span class="header-bar__title">Roy Computer Hub</span>
        </a>
      </div>
    </div>
  </header>

  <main class="page-content">
    <h1>Contact Us</h1>
    <p>Have questions, suggestions, or feedback? We'd love to hear from you. Fill out the form below and we'll get back to you as soon as possible.</p>
    
    <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully! We will get back to you soon.');">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email address" required>
      <input type="text" placeholder="Subject" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </main>

  <footer class="footer">
    <p>© 2026 <strong>Roy Computer Hub</strong> — Smart Resume Builder.</p>
    <div class="footer__links">
      <a href="index.html">Back to Home</a>
    </div>
  </footer>
</body>
</html>
