<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Roy Computer Hub – Smart Resume Builder</title>  
  <meta name="description" content="Create professional, print-ready resumes instantly. Smart layout engine with automatic formatting for freshers and experienced professionals." />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />  
  <link rel="stylesheet" href="style.css" />    
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7323121560865663" crossorigin="anonymous"></script>    

  </head>  

<body>  
  <header class="header-bar" id="header-bar">  
    <div class="header-bar__inner">  
      <div class="header-bar__brand">  
        <div class="rch-logo">  
          <div class="rch-logo__icon">  
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">  
              <path d="M15 15 L55 15 L75 35 L75 85 L15 85 Z" stroke="#b91c1c" stroke-width="6" stroke-linejoin="round"/>  
              <path d="M55 15 L55 35 L75 35" stroke="#b91c1c" stroke-width="6" stroke-linejoin="round"/>  
              <circle cx="35" cy="42" r="8" fill="#b91c1c"/>  
              <path d="M22 62 C22 52, 48 52, 48 62 Z" fill="#b91c1c"/>  
              <line x1="56" y1="48" x2="68" y2="48" stroke="#000" stroke-width="4" stroke-linecap="round"/>  
              <line x1="56" y1="56" x2="68" y2="56" stroke="#000" stroke-width="4" stroke-linecap="round"/>  
              <line x1="22" y1="72" x2="68" y2="72" stroke="#b91c1c" stroke-width="4" stroke-linecap="round"/>  
            </svg>  
          </div>  
          <div class="rch-logo__text">  
            <div class="rch-main-text"><span class="rch-red">R</span><span class="rch-black">CH</span></div>  
            <div class="rch-sub-name">ROY COMPUTER HUB</div>  
            <div class="rch-sub-tag">RESUME BUILDER PLATFORM</div>  
          </div>  
        </div>  
      </div>  
      <div class="header-bar__right">  
        <div class="mode-badge" id="mode-badge">  
          <span class="mode-badge__dot"></span>  
          <span class="mode-badge__label" id="mode-label">Fresher Mode</span>  
        </div>  
        <button class="header-bar__download" onclick="downloadPDF()" title="Download PDF">  
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>  
        </button>  
      </div>  
    </div>  
    <div class="progress-bar">  
      <div class="progress-bar__fill" id="progress-fill"></div>  
    </div>  
  </header>    

  <div class="ad-slot ad-slot--top" style="text-align: center; margin: 10px 0;">  
    <script>  
      atOptions = {  
        'key' : 'd41de0a2ae2524bc1205ecbba0531cce',  
        'format' : 'iframe',  
        'height' : 90,  
        'width' : 728,  
        'params' : {}  
      };  
    </script>  
    <script src="https://www.highperformanceformat.com/d41de0a2ae2524bc1205ecbba0531cce/invoke.js"></script>  
  </div>    

  <main class="app-container">  
    <div class="app-grid">  
      <div class="form-panel" id="form-panel">  
        <form id="resume-form" autocomplete="off">  
          <section class="card" id="section-personal">
            <div class="card__header"><span class="card__number">1</span><h2 class="card__title">Personal Details</h2></div>
            <div class="card__body">
                <div class="form-row form-row--2">
                    <div class="form-group"><label>Applicant's Name <span class="req">*</span></label><input type="text" id="applicantName" required /></div>
                    <div class="form-group"><label>Father's Name <span class="req">*</span></label><input type="text" id="fatherName" required /></div>
                </div>
                <div class="form-row form-row--2">
                    <div class="form-group"><label>Mobile Number <span class="req">*</span></label><input type="tel" id="mobile" required /></div>
                    <div class="form-group"><label>Email Address <span class="req">*</span></label><input type="email" id="email" required /></div>
                </div>
                <div class="form-row form-row--2">
                    <div class="form-group"><label>Date of Birth</label><input type="date" id="dob" required /></div>
                    <div class="form-group"><label>Gender</label><select id="gender" required><option value="Male">Male</option><option value="Female">Female</option></select></div>
                </div>
                <div class="form-group"><label>Address</label><input type="text" id="address" required /></div>
                <div class="form-group"><label>Career Objective</label><textarea id="objective" rows="3">To work with an organization where I can learn new skills...</textarea></div>
            </div>
          </section>

          <section class="card" id="section-education">  
            <div class="card__header"><span class="card__number">2</span><h2 class="card__title">Educational Qualifications</h2></div>  
            <div class="card__body">  
              <div id="education-list"></div>  
              <button type="button" class="btn btn--add" onclick="addEducation()">+ Add Education</button>  
            </div>  
          </section>  

          <section class="card" id="section-final">  
            <div class="card__header"><span class="card__number">4</span><h2 class="card__title">Final Steps</h2></div>  
            <div class="card__body">  
              <div class="form-row form-row--2">  
                <div class="form-group"><label>Place</label><input type="text" id="declarationPlace" /></div>  
                <div class="form-group"><label>Photo (100KB)</label><input type="file" id="photoUpload" accept="image/*" /></div>  
              </div>  
            </div>  
          </section>
        </form>  

        <div class="generate-bar">  
          <button class="btn btn--generate" onclick="downloadPDF()">Generate My Resume</button>  
        </div>  
      </div>  

      <div class="preview-panel" id="preview-panel">  
        <div class="preview-panel__header"><h2>👁️ Live Preview</h2></div>  
        <div class="preview-scroll" id="preview-scroll">  
          <div class="resume-page" id="resume-page"><div class="resume-border"><div class="resume-content" id="resume-content"></div></div></div>  
        </div>  
      </div>  
    </div>
  </main>    

  <div style="display: flex; justify-content: center; margin: 20px 0;">  
    <script async="async" data-cfasync="false" src="https://pl29085824.profitablecpmratenetwork.com/08f76d0d0b95655e02767065d0897c43/invoke.js"></script>  
    <div id="container-08f76d0d0b95655e02767065d0897c43"></div>  
  </div>    

  <div class="ad-slot ad-slot--bottom" style="text-align: center; margin: 20px 0;">  
    <script>  
      atOptions = {  
        'key' : '4aa732cfce15f5aa37be7e0b097c7fac',  
        'format' : 'iframe',  
        'height' : 60,  
        'width' : 468,  
        'params' : {}  
      };  
    </script>  
    <script src="https://www.highperformanceformat.com/4aa732cfce15f5aa37be7e0b097c7fac/invoke.js"></script>  
  </div>    

  <footer class="footer">  
    <p>© 2026 <strong>Roy Computer Hub</strong> — All Rights Reserved.</p>  
  </footer>    

  <div id="resume-output" class="print-only-container"></div>    
  <button class="fab-preview" id="fab-preview" onclick="toggleMobilePreview()">👁️</button>    
  <script src="app.js"></script>  
</body>  
</html>
